<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partecipazioni</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../style/materialize.css">
    </link>
    <link rel="stylesheet" href="../style/partecipazioni.css">
    </link>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Tangerine">
    </link>
</head>

<body>
    <!-- NAVBAR START -->
    <!-- TODO: Allargare la navbar -->
    <div class="wed-navbar-bar">
        <div class="wed-navbar-menu">
            <a href="index.html">Home</a>
            <a href="partecipazioni.html">Partecipazioni</a>
            <a href="listadinozze.html">Lista di Nozze</a>
            <a href="foto.html">Foto</a>
            <a href="cerimonia.html">Cerimonia</a>
            <a href="admin.html">Admin</a>
        </div>
    </div>
    <!-- NAVBAR END -->

    <!-- TITLE START -->
    <div class="title" id="title">
        <p>
            Ci servono alcune informazioni per rendere la giornata indimenticabile
        </p>
    </div>
    <!-- TITLE END -->

    <!-- FORM START -->
    <div class="card">
        <form class="col s12" action="#" method="post">
            <!-- TITLE ROW START -->
            <div class="row" id="title-row">
                <div class="col s4">
                    <p>Dettagli degli invitati</p>
                </div>
                <div class="col s4">
                    <p>Contatti</p>
                </div>
                <div class="col s4">
                    <p>Informazioni per il menù</p>
                </div>
            </div>
            <!-- TITLE ROW END -->

            <!-- ROW START -->
            <div class="row">
                <div class="input-field col s4">
                    <input id="name" type="text" class="validate" required>
                    <label for="name">Nome e Cognome</label>
                </div>
                <div class="input-field col s4">
                    <input id="address" type="text" class="validate" required>
                    <label for="address">Indirizzo</label>
                </div>
                <div class="input-field col s4">
                    <input id="allergies" type="text" class="validate">
                    <label for="allergies">Allergie</label>
                </div>
            </div>
            <!-- ROW 1 END -->

            <!-- ROW 2 START -->
            <div class="row">
                <div class="input-field col s4">
                    <select>
                        <option value="0">Parente</option>
                        <option value="1">Amico</option>
                        <option value="2">Collega dello sposo</option>
                        <option value="3">Collega della sposa</option>
                    </select>
                    <label>Relazione con gli sposi</label>
                </div>
                <div class="input-field col s4">
                    <input id="email" type="email" class="validate" required>
                    <label for="email">Email</label>
                </div>
                <div class="input-field col s4">
                    <input id="intolerances" type="text" class="validate">
                    <label for="intolerances">Intolleranze</label>
                </div>
            </div>
            <!-- ROW 2 END -->

            <!-- ROW 3 START -->
            <div class="row">
                <div class="input-field col s4">
                    <p>
                        <label>
                            <input type="checkbox" />
                            <span>Sei il referente?</span>
                        </label>
                    </p>
                </div>
                <div class="input-field col s4">
                    <input id="phone" type="tel" class="validate" required>
                    <label for="phone">Telefono</label>
                </div>
                <div class="input-field col s4">
                    <input id="taste-and-belief" type="text" class="validate">
                    <label for="taste-and-belief">Gusto / Credo</label>
                </div>
            </div>
            <!-- ROW 3 END -->

            <div class="row">
                <div class="col s3 offset-s9">
                    <button class="waves-effect waves-light btn" type="submit">Invia</button>
                </div>
            </div>
        </form>
    </div>
    <!-- FORM END -->

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-validate/1.19.0/jquery.validate.min.js"></script>
    <script src="/dist/js/jquery-validator-messages.js"></script>
    <script src="../js/partecipazioni.js"></script>
    <script type="text/javascript" src="../../assets/style/materialize/js/bin/materialize.min.js"></script>
</body>

</html>
